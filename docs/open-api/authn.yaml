---

paths:

  /authn/me:
    get:
      tags:
        - authentication
      summary: Get the authenticated principal
      operationId: getAuthenticatedPrincipal
      description: >
        Returns the server-resolved principal name for the current authenticated user.
        The principal is derived from the JWT token using the configured `principalFields`
        and `principalMapper`, ensuring consistency between server-side identity and UI display.
      responses:
        "200":
          description: Returns the authenticated principal information
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
              examples:
                AuthMeResponse:
                  $ref: "#/components/examples/AuthMeResponse"
        "401":
          description: Unauthorized - Authentication credentials are missing or invalid
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorModel"
        "5xx":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

components:
  schemas:
    AuthMeResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        principal:
          type: string
          description: The server-resolved principal name of the authenticated user

  examples:
    AuthMeResponse:
      value: {
        "code": 0,
        "principal": "admin"
      }
