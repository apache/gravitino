    ReplaceViewRequest:
      type: object
      description: |
        Atomically replaces the body of a view. Columns, representations, default catalog, default
        schema and comment are all replaced. The view name and properties are not affected.
      required:
        - '@type'
        - representations
      properties:
        '@type':
          type: string
          enum:
            - replaceView
        columns:
          type: array
          description: The new output columns of the view
          items:
            $ref: '#/components/schemas/Column'
        representations:
          type: array
          description: The new representations of the view, at least one is required
          minItems: 1
          items:
            $ref: '#/components/schemas/Representation'
