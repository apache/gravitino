components:
  schemas:
    Audit:
      type: object
      description: Audit information for a Gravitino resource.
      properties:
        creator:
          type: string
          description: The user who created the resource
        createTime:
          type: string
          format: date-time
          description: The time the resource was created
        lastModifier:
          type: string
          description: The user who last modified the resource
        lastModifiedTime:
          type: string
          format: date-time
          description: The time the resource was last modified
    ErrorModel:
      type: object
      description: JSON error payload returned in a response with further details on the error
      required:
        - message
        - type
        - code
      properties:
        code:
          type: integer
          minimum: 1000
          maximum: 1100
          description: HTTP response code
          example: 1002
        type:
          type: string
          description: Internal type definition of the error
        message:
          type: string
          description: A human-readable message
        stack:
          type: array
          items:
            type: string
    NameIdentifier:
      type: object
      description: A identifier for an entity
      required:
        - namespace
        - name
      properties:
        namespace:
          type: array
          description: The namespace of the entity may be with multiple levels
          items:
            type: string
        name:
          type: string
          description: The name of the entity
    NameListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
        names:
          type: array
          items:
            type: string
    HealthCheck:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          description: Name of the component being checked
          example: entityStore
        status:
          type: string
          enum:
            - UP
            - DOWN
          description: Status of the component
        details:
          type: object
          additionalProperties:
            type: string
          description: Optional diagnostic details about the check result
    HealthResponse:
      type: object
      required:
        - code
        - status
        - checks
      properties:
        code:
          type: integer
          description: Response code, 0 for success
          example: 0
        status:
          type: string
          enum:
            - UP
            - DOWN
          description: Aggregate health status
        checks:
          type: array
          description: Per-component check results
          items:
            $ref: '#/components/schemas/HealthCheck'
    Metalake:
      type: object
      description: Gravitino Metalake is the top-level metadata repository for users. It contains a list of catalogs as sub-level metadata collections. With GravitinoMetaLake, users can list, create, load, alter and drop a catalog with specified identifier.
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the Metalake
        comment:
          type: string
          description: A comment about the Metalake
          nullable: true
        audit:
          $ref: '#/components/schemas/Audit'
        properties:
          type: object
          description: Configured string to string map of properties for the Metalake
          default: {}
          additionalProperties:
            type: string
      example:
        name: my_metalake
        comment: This is my metalake
        properties:
          key1: value1
          key2: value2
          gravitino.identifier: gravitino.v1.uid4516733622157792920
        audit:
          creator: gravitino
          createTime: '2023-12-07T14:04:17.349Z'
    MetalakeCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the metalake
        comment:
          type: string
          description: A comment about the metalake
          nullable: true
        properties:
          type: object
          description: Configured string to string map of properties for the metalake
          nullable: true
          default: {}
          additionalProperties:
            type: string
    RenameMetalakeRequest:
      type: object
      required:
        - '@type'
        - newName
      properties:
        '@type':
          type: string
          enum:
            - rename
        newName:
          type: string
          description: The new name of the metalake
      example:
        '@type': rename
        newName: my_metalake_new
    UpdateMetalakeCommentRequest:
      type: object
      required:
        - '@type'
        - newComment
      properties:
        '@type':
          type: string
          enum:
            - updateComment
        newComment:
          type: string
          description: The new comment of the metalake
      example:
        '@type': updateComment
        newComment: This is my new metalake comment
    SetMetalakePropertyRequest:
      type: object
      required:
        - '@type'
        - property
        - value
      properties:
        '@type':
          type: string
          enum:
            - setProperty
        property:
          type: string
          description: The property to set
        value:
          type: string
          description: The value to set
      example:
        '@type': setProperty
        property: key1
        value: value1_new
    RemoveMetalakePropertyRequest:
      type: object
      required:
        - '@type'
        - property
      properties:
        '@type':
          type: string
          enum:
            - removeProperty
        property:
          type: string
          description: The property to remove
      example:
        '@type': removeProperty
        property: key2
    MetalakeUpdateRequest:
      oneOf:
        - $ref: '#/components/schemas/RenameMetalakeRequest'
        - $ref: '#/components/schemas/UpdateMetalakeCommentRequest'
