          type: string
          description: The uri name of the model version to be added
        uri:
          type: string
          description: The uri of the model version to be added
      example:
        '@type': addUri
        uriName: default-uri-name
        uri: s3://path/to/model
    RemoveModelVersionUriRequest:
      type: object
      required:
        - '@type'
        - uriName
      properties:
        '@type':
          type: string
          enum:
            - removeUri
        uriName:
