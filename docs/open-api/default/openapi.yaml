        type:
          type: string
          enum:
            - struct
        fields:
          type: array
          items:
            $ref: '#/components/schemas/StructField'
      example:
        type: struct
        fields:
          - name: id
            type: integer
            nullable: false
            comment: The id of the user
          - name: name
            type: string
            nullable: false
            comment: The name of the user
    ListType:
      type: object
      required:
        - type
        - elementType
      properties:
        type:
          type: string
          enum:
            - list
        containsNull:
          type: boolean
          description: Whether the list contains null values
          nullable: true
          default: true
        elementType:
          $ref: '#/components/schemas/DataType'
      example:
        type: list
        elementType: integer
        containsNull: false
    MapType:
      type: object
      required:
        - type
        - keyType
        - valueType
      properties:
        type:
          type: string
          enum:
            - map
        keyType:
          $ref: '#/components/schemas/DataType'
        valueType:
          $ref: '#/components/schemas/DataType'
        valueContainsNull:
          type: boolean
          description: Whether the value of the map contains null values
          nullable: true
          default: true
      example:
        type: map
        keyType: string
        valueType: integer
        valueContainsNull: false
    UnionType:
      type: object
      required:
        - type
        - types
      properties:
        type:
          type: string
          enum:
            - union
        types:
          type: array
          items:
            $ref: '#/components/schemas/DataType'
      example:
        type: union
        types:
          - string
          - integer
    UnparsedType:
      type: object
      required:
        - type
        - unparsedType
      properties:
        type:
          type: string
          enum:
            - unparsed
        unparsedType:
          type: string
          description: The unparsed type
      example:
        type: unparsed
        unparsedType:
          - unknown-type
    Literal:
      type: object
      required:
        - dataType
        - value
      properties:
        type:
          type: string
          enum:
            - literal
        dataType:
          $ref: '#/components/schemas/DataType'
        value:
          type: string
          description: The string format of the literal value
    FieldName:
      type: array
      description: The name of the field, may be with multiple levels
      items:
        type: string
    Field:
      type: object
      required:
        - type
        - fieldName
      properties:
        type:
          type: string
          enum:
            - field
        fieldName:
          $ref: '#/components/schemas/FieldName'
    FunctionArg:
      oneOf:
        - $ref: '#/components/schemas/Literal'
        - $ref: '#/components/schemas/Field'
        - $ref: '#/components/schemas/Function'
      discriminator:
        propertyName: type
        mapping:
          literal: '#/components/schemas/Literal'
          field: '#/components/schemas/Field'
          function: '#/components/schemas/Function'
    Function:
      type: object
      required:
        - type
        - funcName
        - funcArgs
      properties:
        type:
          type: string
          enum:
            - function
        funcName:
          type: string
          description: The name of the function
        funcArgs:
          type: array
          description: The arguments of the function
          items:
            $ref: '#/components/schemas/FunctionArg'
    ColumnDefaultValue:
      allOf:
        - $ref: '#/components/schemas/FunctionArg'
      description: The default value of the column
    Column:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: The name of the column
        type:
          $ref: '#/components/schemas/DataType'
        comment:
          type: string
          description: The comment of the column
          nullable: true
        nullable:
          type: boolean
          description: Whether the column is nullable
          nullable: true
          default: true
        defaultValue:
          $ref: '#/components/schemas/ColumnDefaultValue'
        autoIncrement:
          type: boolean
          description: Whether the column is auto increment
          nullable: true
          default: false
    SortOrder:
      type: object
      required:
        - sortTerm
      properties:
        sortTerm:
          $ref: '#/components/schemas/FunctionArg'
        direction:
          type: string
          description: The direction of the sort order
          enum:
            - asc
            - desc
          nullable: true
          default: asc
        nullOrdering:
          type: string
          description: ｜ The sort order of null values. The default value is "nulls_first" if the direction is "asc", otherwise "nulls_last".
          enum:
            - nulls_first
            - nulls_last
    Distribution:
      type: object
      description: Describes how data is distributed across partitions
      nullable: true
      required:
        - number
        - funcArgs
      properties:
        strategy:
          type: string
          description: The distribution strategy
          nullable: true
          default: hash
          enum:
            - hash
            - range
            - even
        number:
          type: integer
          description: The number of buckets/distribution
          format: int32
        funcArgs:
          type: array
          description: The arguments of the distribution function
          nullable: true
          default: []
          items:
            $ref: '#/components/schemas/FunctionArg'
    IdentityPartitioning:
      type: object
      required:
        - strategy
        - fieldName
      properties:
        strategy:
          type: string
          enum:
            - identity
        fieldName:
          $ref: '#/components/schemas/FieldName'
    YearPartitioning:
      type: object
      required:
        - strategy
        - fieldName
      properties:
        strategy:
          type: string
          enum:
            - year
        fieldName:
          $ref: '#/components/schemas/FieldName'
    MonthPartitioning:
      type: object
      required:
        - strategy
        - fieldName
      properties:
        strategy:
          type: string
          enum:
            - month
        fieldName:
          $ref: '#/components/schemas/FieldName'
    DayPartitioning:
      type: object
      required:
        - strategy
        - fieldName
      properties:
        strategy:
          type: string
          enum:
            - day
        fieldName:
          $ref: '#/components/schemas/FieldName'
    HourPartitioning:
      type: object
      required:
        - strategy
        - fieldName
      properties:
        strategy:
          type: string
          enum:
            - hour
        fieldName:
          $ref: '#/components/schemas/FieldName'
    FieldNames:
      type: array
      description: The names of the fields, each field may be with multiple levels
      items:
        $ref: '#/components/schemas/FieldName'
    BucketPartitioning:
      type: object
      required:
        - strategy
        - numBuckets
        - fieldNames
      properties:
        strategy:
          type: string
          enum:
            - bucket
        numBuckets:
          type: integer
          description: The number of buckets
        fieldNames:
          $ref: '#/components/schemas/FieldNames'
    TruncatePartitioning:
      type: object
      required:
        - strategy
        - width
        - fieldName
      properties:
        strategy:
          type: string
          enum:
            - truncate
        width:
          type: integer
          description: The width of the truncate
        fieldName:
          $ref: '#/components/schemas/FieldName'
    Name:
      type: string
      description: The name of the partition
    ListValue:
      type: array
      description: The elements of lists partition
      items:
        $ref: '#/components/schemas/Literal'
    Properties:
      type: object
      description: The properties of the partition
      nullable: true
      default: {}
      additionalProperties:
        type: string
    ListPartition:
      type: object
      required:
        - type
        - name
        - lists
      properties:
        type:
          type: string
          enum:
            - list
        name:
          $ref: '#/components/schemas/Name'
        lists:
          type: array
          description: The values of the partition
          items:
            $ref: '#/components/schemas/ListValue'
        properties:
          $ref: '#/components/schemas/Properties'
    ListPartitioning:
      type: object
      required:
        - strategy
        - fieldNames
      properties:
        strategy:
          type: string
          enum:
            - list
        fieldNames:
          $ref: '#/components/schemas/FieldNames'
        assignments:
          type: array
          description: The pre-assigned list partitions
          items:
            $ref: '#/components/schemas/ListPartition'
    RangePartition:
      type: object
      required:
        - type
        - name
        - upper
        - lower
      properties:
        type:
          type: string
          enum:
            - range
        name:
          $ref: '#/components/schemas/Name'
        upper:
          $ref: '#/components/schemas/Literal'
        lower:
          $ref: '#/components/schemas/Literal'
        properties:
          $ref: '#/components/schemas/Properties'
    RangePartitioning:
      type: object
      required:
        - strategy
        - fieldName
      properties:
        strategy:
          type: string
          enum:
            - range
        fieldName:
          $ref: '#/components/schemas/FieldName'
        assignments:
          type: array
          description: The pre-assigned range partitions
          items:
            $ref: '#/components/schemas/RangePartition'
    FunctionPartitioning:
      type: object
      required:
        - strategy
        - funcName
        - funcArgs
      properties:
        strategy:
          type: string
          enum:
            - function
        funcName:
          type: string
          description: The name of the partitioning function
        funcArgs:
          type: array
          description: The arguments of the partitioning function
          items:
            $ref: '#/components/schemas/FunctionArg'
    PartitioningSpec:
      oneOf:
        - $ref: '#/components/schemas/IdentityPartitioning'
        - $ref: '#/components/schemas/YearPartitioning'
        - $ref: '#/components/schemas/MonthPartitioning'
        - $ref: '#/components/schemas/DayPartitioning'
        - $ref: '#/components/schemas/HourPartitioning'
        - $ref: '#/components/schemas/BucketPartitioning'
        - $ref: '#/components/schemas/TruncatePartitioning'
        - $ref: '#/components/schemas/ListPartitioning'
        - $ref: '#/components/schemas/RangePartitioning'
        - $ref: '#/components/schemas/FunctionPartitioning'
      discriminator:
        propertyName: strategy
        mapping:
          identity: '#/components/schemas/IdentityPartitioning'
          year: '#/components/schemas/YearPartitioning'
          month: '#/components/schemas/MonthPartitioning'
          day: '#/components/schemas/DayPartitioning'
          hour: '#/components/schemas/HourPartitioning'
          bucket: '#/components/schemas/BucketPartitioning'
          truncate: '#/components/schemas/TruncatePartitioning'
          list: '#/components/schemas/ListPartitioning'
          range: '#/components/schemas/RangePartitioning'
          function: '#/components/schemas/FunctionPartitioning'
    IndexSpec:
      type: object
      required:
        - indexType
        - fieldNames
      properties:
        indexType:
          type: string
          enum:
            - primary_key
            - unique_key
            - data_skipping_minmax
            - data_skipping_bloom_filter
            - data_skipping_set
        name:
          type: string
          description: The name of the index
          nullable: true
        fieldNames:
          $ref: '#/components/schemas/FieldNames'
        properties:
          type: object
          additionalProperties:
            type: string
          description: Extra index properties (e.g., granularity for ClickHouse data-skipping indexes)
    TableCreateRequest:
      type: object
      required:
        - name
        - columns
      properties:
        name:
          type: string
          description: The name of the table
        columns:
          type: array
          description: A list of columns
          items:
            $ref: '#/components/schemas/Column'
        comment:
          type: string
          description: The comment of the table
          nullable: true
        properties:
          type: object
          description: A map of table properties
          nullable: true
          default: {}
          additionalProperties:
            type: string
        sortOrders:
          type: array
          description: Describes the sort order of the table data
          nullable: true
          default: []
          items:
            $ref: '#/components/schemas/SortOrder'
        distribution:
          $ref: '#/components/schemas/Distribution'
        partitioning:
          type: array
          description: partitioning of the table data
          nullable: true
          default: []
          items:
            $ref: '#/components/schemas/PartitioningSpec'
        indexes:
          type: array
          description: Indexes of the table
          nullable: true
          default: []
          items:
            $ref: '#/components/schemas/IndexSpec'
    Table:
      type: object
      description: A table object
      required:
        - name
        - columns
        - audit
      properties:
        name:
          type: string
          description: The name of the table
        columns:
          type: array
          description: A list of columns
          items:
            $ref: '#/components/schemas/Column'
        comment:
          type: string
          description: The comment of the table
          nullable: true
        audit:
          $ref: '#/components/schemas/Audit'
        properties:
          type: object
          description: A map of table properties
          nullable: true
          default: {}
          additionalProperties:
            type: string
        distribution:
          $ref: '#/components/schemas/Distribution'
        sortOrders:
          type: array
          description: Describes the sort order of the table data
          nullable: true
          default: []
          items:
            $ref: '#/components/schemas/SortOrder'
        partitioning:
          type: array
          description: partitioning of the table data
          nullable: true
          default: []
          items:
            $ref: '#/components/schemas/PartitioningSpec'
        indexes:
          type: array
          description: Indexes of the table
          nullable: true
          default: []
          items:
            $ref: '#/components/schemas/IndexSpec'
    RenameTableRequest:
      type: object
      required:
        - '@type'
        - newName
      properties:
        '@type':
          type: string
          enum:
            - rename
        newName:
          type: string
          description: The new name of the table
        newSchemaName:
          type: string
          description: The new schema name of the table, if not provided, the schema will not be changed
          nullable: true
      example:
        '@type': rename
        newName: my_hive_table_new
        newSchemaName: my_hive_schema_new
    UpdateTableCommentRequest:
      type: object
      required:
        - '@type'
        - newComment
      properties:
        '@type':
          type: string
          enum:
            - updateComment
        newComment:
          type: string
          description: The new comment of the table
      example:
        '@type': updateComment
        newComment: This is my Hive table new comment
    SetTablePropertyRequest:
      type: object
      required:
        - '@type'
        - property
        - value
      properties:
        '@type':
          type: string
          enum:
            - setProperty
        property:
          type: string
          description: The name of the property to set
        value:
          type: string
          description: The value of the property to set
      example:
        '@type': setProperty
        property: key1
        value: value1_new
    RemoveTablePropertyRequest:
      type: object
      required:
        - '@type'
        - property
      properties:
        '@type':
          type: string
          enum:
            - removeProperty
        property:
          type: string
          description: The name of the property to remove
      example:
        '@type': removeProperty
        property: key2
    FirstColumnPosition:
      type: string
      enum:
        - first
    AfterColumnPosition:
      type: object
      required:
        - after
      properties:
        after:
          type: string
          description: The name of the column which the new column will be added after
    DefaultColumnPosition:
      type: string
      description: |
        The default position of the column to add, the position is determined by the catalog implementation
      enum:
        - default
    ColumnPosition:
      oneOf:
        - $ref: '#/components/schemas/FirstColumnPosition'
        - $ref: '#/components/schemas/AfterColumnPosition'
        - $ref: '#/components/schemas/DefaultColumnPosition'
    AddTableColumnRequest:
      type: object
      required:
        - '@type'
        - fieldName
        - type
      properties:
        '@type':
          type: string
          enum:
            - addColumn
        fieldName:
          $ref: '#/components/schemas/FieldName'
          description: The name of the column to add
        type:
          $ref: '#/components/schemas/DataType'
          description: The type of the column to add
        comment:
          type: string
          description: The comment of the column to add
          nullable: true
        position:
          $ref: '#/components/schemas/ColumnPosition'
          description: The position of the column to add
          nullable: true
          default: default
        nullable:
          type: boolean
          description: Whether the column to add is nullable
          nullable: true
          default: true
        autoIncrement:
          type: boolean
          description: Whether the column to add should auto increment
          nullable: true
          default: false
        defaultValue:
          $ref: '#/components/schemas/ColumnDefaultValue'
          description: The default value of the column to add
          nullable: true
      example:
        '@type': addColumn
        fieldName:
          - new_column
        type: integer
        comment: new integer column comment
        position: first
        nullable: true
        autoIncrement: false
        defaultValue:
          type: literal
          dataType: integer
          value: '1024'
    RenameTableColumnRequest:
      type: object
      required:
        - '@type'
        - oldFieldName
        - newFieldName
      properties:
        '@type':
          type: string
          enum:
            - renameColumn
        oldFieldName:
          $ref: '#/components/schemas/FieldName'
          description: The name of the column to rename
        newFieldName:
          type: string
          description: The new name of the field
      example:
        '@type': renameColumn
        oldFieldName:
          - existing_column
        newFieldName: existing_column_new
    UpdateTableColumnTypeRequest:
      type: object
      required:
        - '@type'
        - fieldName
        - newType
      properties:
        '@type':
          type: string
          enum:
            - updateColumnType
        fieldName:
          $ref: '#/components/schemas/FieldName'
          description: The name of the column to update
        newType:
          $ref: '#/components/schemas/DataType'
          description: The new type of the column
      example:
        '@type': updateColumnType
        fieldName:
          - existing_column
        newType: string
    UpdateTableColumnCommentRequest:
      type: object
      required:
        - '@type'
        - fieldName
        - newComment
      properties:
        '@type':
          type: string
          enum:
            - updateColumnComment
        fieldName:
          $ref: '#/components/schemas/FieldName'
          description: The name of the column to update
        newComment:
          type: string
          description: The new comment of the column
      example:
        '@type': updateColumnComment
        fieldName:
          - existing_column
        newComment: existing column new comment
    UpdateTableColumnPositionRequest:
      type: object
      required:
        - '@type'
        - fieldName
        - newPosition
      properties:
        '@type':
          type: string
          enum:
            - updateColumnPosition
        fieldName:
          $ref: '#/components/schemas/FieldName'
          description: The name of the column to update
        newPosition:
          $ref: '#/components/schemas/ColumnPosition'
          description: The new position of the column
      example:
        '@type': updateColumnPosition
        fieldName:
          - existing_column
        newPosition:
          after: existing_column
    UpdateTableColumnNullabilityRequest:
      type: object
      required:
        - '@type'
        - fieldName
        - nullable
      properties:
        '@type':
          type: string
          enum:
            - updateColumnNullability
        fieldName:
          $ref: '#/components/schemas/FieldName'
          description: The name of the column to update
        nullable:
          type: boolean
          description: Whether the column is nullable
      example:
        '@type': updateColumnNullability
        fieldName:
          - existing_column
        nullable: true
    UpdateTableColumnDefaultValueRequest:
      type: object
      required:
        - '@type'
        - fieldName
        - newDefaultValue
      properties:
        '@type':
          type: string
          enum:
            - updateColumnDefaultValue
        fieldName:
          $ref: '#/components/schemas/FieldName'
          description: The name of the column to update
        newDefaultValue:
          $ref: '#/components/schemas/ColumnDefaultValue'
          description: The new default value of the column
      example:
        '@type': updateColumnDefaultValue
        fieldName:
          - existing_column
        newDefaultValue:
          type: literal
          dataType: varchar(100)
          value: new default value
    DeleteTableColumnRequest:
      type: object
      required:
        - '@type'
        - fieldName
      properties:
        '@type':
          type: string
          enum:
            - deleteColumn
        fieldName:
          $ref: '#/components/schemas/FieldName'
          description: The name of the column to delete
        ifExists:
          type: boolean
          description: If true, the request will not fail if the column does not exist
          nullable: true
          default: false
      example:
        '@type': deleteColumn
        fieldName:
          - no_existing_column
        ifExists: true
    TableUpdateRequest:
      oneOf:
        - $ref: '#/components/schemas/RenameTableRequest'
        - $ref: '#/components/schemas/UpdateTableCommentRequest'
        - $ref: '#/components/schemas/SetTablePropertyRequest'
        - $ref: '#/components/schemas/RemoveTablePropertyRequest'
        - $ref: '#/components/schemas/AddTableColumnRequest'
        - $ref: '#/components/schemas/RenameTableColumnRequest'
        - $ref: '#/components/schemas/UpdateTableColumnTypeRequest'
        - $ref: '#/components/schemas/UpdateTableColumnCommentRequest'
        - $ref: '#/components/schemas/UpdateTableColumnPositionRequest'
        - $ref: '#/components/schemas/UpdateTableColumnNullabilityRequest'
        - $ref: '#/components/schemas/UpdateTableColumnDefaultValueRequest'
        - $ref: '#/components/schemas/DeleteTableColumnRequest'
      discriminator:
        propertyName: '@type'
        mapping:
          rename: '#/components/schemas/RenameTableRequest'
          updateComment: '#/components/schemas/UpdateTableCommentRequest'
          setProperty: '#/components/schemas/SetTablePropertyRequest'
          removeProperty: '#/components/schemas/RemoveTablePropertyRequest'
          addColumn: '#/components/schemas/AddTableColumnRequest'
          renameColumn: '#/components/schemas/RenameTableColumnRequest'
          updateColumnType: '#/components/schemas/UpdateTableColumnTypeRequest'
          updateColumnComment: '#/components/schemas/UpdateTableColumnCommentRequest'
          updateColumnPosition: '#/components/schemas/UpdateTableColumnPositionRequest'
          updateColumnNullability: '#/components/schemas/UpdateTableColumnNullabilityRequest'
          updateColumnDefaultValue: '#/components/schemas/UpdateTableColumnDefaultValueRequest'
          deleteColumn: '#/components/schemas/DeleteTableColumnRequest'
    TableUpdatesRequest:
      type: object
      required:
        - updates
      properties:
        updates:
          type: array
          items:
            $ref: '#/components/schemas/TableUpdateRequest'
    PartitionNameListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
          example: 0
        names:
          type: array
          description: A list of partition names
          items:
            type: string
    IdentityPartition:
      type: object
      required:
        - type
        - fieldNames
        - values
      properties:
        type:
          type: string
          enum:
            - identity
        name:
          $ref: '#/components/schemas/Name'
        fieldNames:
          $ref: '#/components/schemas/FieldNames'
        values:
          type: array
          description: The values of the partition, must be the same length and order as fieldNames
          items:
            $ref: '#/components/schemas/Literal'
        properties:
          $ref: '#/components/schemas/Properties'
    PartitionSpec:
      oneOf:
        - $ref: '#/components/schemas/IdentityPartition'
        - $ref: '#/components/schemas/RangePartition'
        - $ref: '#/components/schemas/ListPartition'
      discriminator:
        propertyName: type
        mapping:
          identity: '#/components/schemas/IdentityPartition'
          range: '#/components/schemas/RangePartition'
          list: '#/components/schemas/ListPartition'
    PartitionListResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
          description: Status code of the response
          enum:
            - 0
          example: 0
        partitions:
          type: array
          description: A list of partitions
          items:
            $ref: '#/components/schemas/PartitionSpec'
    AddPartitionsRequest:
      type: object
      required:
        - partitions
      properties:
        partitions:
          type: array
          description: The partitions to add
          items:
            $ref: '#/components/schemas/PartitionSpec'
    FilesetCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The name of the fileset. Can not be empty.
        type:
          type: string
          description: The type of the fileset. The value of type should be EXTERNAL or MANAGED
          nullable: true
        comment:
          type: string
          description: The comment of the fileset. Can be empty.
          nullable: true
        storageLocation:
          type: string
          description: The location of the fileset. If the storage location of managed fileset is empty, it will \ use the location of namespace. The storage location of external fileset must be set.
          nullable: true
        storageLocations:
          type: object
          description: The storage locations of the fileset. If the storage location of managed fileset is empty, \ it will use the location of namespace. The storage locations of external fileset must be set.
          nullable: true
          default: {}
          additionalProperties:
            type: string
        properties:
          type: object
          description: The properties of the fileset. Can be empty.
          nullable: true
          default: {}
          additionalProperties:
            type: string
