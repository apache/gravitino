openapi: 3.0.3
info:
  title: Gravitino REST API
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 2.0.0-SNAPSHOT
  description: |
    Defines the specification for the first version of the Gravitino REST API.
servers:
  - url: '{scheme}://{host}:{port}/{basePath}'
    description: Generic base server URL, with all parts configurable.
    variables:
      scheme:
        description: The scheme of the URI, either http or https.
        default: http
      host:
        description: The host address for the specified server
        default: localhost
      port:
        description: The port used when addressing the host
        default: '8090'
      basePath:
        description: Optional prefix to be appended to all routes
        default: api
security:
  - OAuth2WithJWT:
      - serviceAudience
  - BasicAuth: []
paths:
  /health:
    get:
      tags:
        - health
      summary: Aggregate health
      operationId: aggregateHealth
      description: |
        Returns aggregate health status combining liveness and readiness checks. Returns 200 when all checks pass; 503 when any check fails. This endpoint is exempt from authentication so probes can reach it without credentials. Root-level aliases at /health and /health.html (outside the /api base path) are also available for GTMs that require probes at well-known root paths.
      security: []
      responses:
        '200':
          $ref: '#/components/responses/HealthResponse'
        '503':
          $ref: '#/components/responses/HealthResponse'
        4XX:
          $ref: '#/components/responses/BadRequestErrorResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'
  /health/live:
    get:
      tags:
        - health
      summary: Liveness check
      operationId: livenessCheck
      description: |
        Returns 200 as long as the HTTP server thread can respond. Use this for Kubernetes liveness probes to determine whether to restart a pod. This endpoint is exempt from authentication so probes can reach it without credentials. A root-level alias at /health/live (outside the /api base path) is also available for GTMs that require probes at well-known root paths.
      security: []
      responses:
        '200':
          $ref: '#/components/responses/HealthResponse'
        4XX:
          $ref: '#/components/responses/BadRequestErrorResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'
  /health/ready:
    get:
      tags:
        - health
      summary: Readiness check
      operationId: readinessCheck
      description: |
        Returns 200 when the entity store is reachable within the configured probe timeout. Returns 503 when the entity store is unavailable or slow. Use this for Kubernetes readiness probes to control traffic routing. This endpoint is exempt from authentication so probes can reach it without credentials. A root-level alias at /health/ready (outside the /api base path) is also available for GTMs that require probes at well-known root paths.
      security: []
      responses:
        '200':
          $ref: '#/components/responses/HealthResponse'
        '503':
          $ref: '#/components/responses/HealthResponse'
        4XX:
          $ref: '#/components/responses/BadRequestErrorResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'
  /metalakes:
    get:
      tags:
        - metalake
      summary: List metalakes
      operationId: listMetalakes
      description: Returns a list of all metalakes.
      responses:
        '200':
          $ref: '#/components/responses/ListMetalakesResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    post:
      tags:
        - metalake
      summary: Create metalake
      operationId: createMetalake
      description: Creates a new metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetalakeCreateRequest'
            examples:
              MetalakeCreate:
                $ref: '#/components/examples/MetalakeCreate'
      responses:
        '200':
          $ref: '#/components/responses/MetalakeResponse'
        '409':
          description: Conflict - The target metalake already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                MetalakeAlreadyExistsException:
                  $ref: '#/components/examples/MetalakeAlreadyExistsException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
  /metalakes/{name}:
    parameters:
      - name: name
        in: path
        description: The name of the metalake to retrieve
        required: true
        schema:
          type: string
    get:
      tags:
        - metalake
      summary: Get metalake
      operationId: loadMetalake
      description: Returns a metalake information by given metalake name
      responses:
        '200':
          $ref: '#/components/responses/MetalakeResponse'
        '404':
          description: Not Found - The metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    put:
      tags:
        - metalake
      summary: Update metalake
      operationId: alterMetalake
      description: Alters a specified metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetalakeUpdatesRequest'
      responses:
        '200':
          $ref: '#/components/responses/MetalakeResponse'
        '404':
          description: Not Found - The metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
        '409':
          description: Conflict - The target (metalake)name already exists
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                MetalakeAlreadyExistsException:
                  $ref: '#/components/examples/MetalakeAlreadyExistsException'
        '500':
          description: Internal server error. It is possible that the server encountered a storage issue.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
    patch:
      tags:
        - metalake
      summary: set metalake in-use
      operationId: setMetalake
      description: Set a specified metalake in-use or not in-use
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetalakeSetRequest'
      responses:
        '200':
          $ref: '#/components/responses/BaseResponse'
        '404':
          description: Not Found - The metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
        '500':
          description: Internal server error. It is possible that the server encountered a storage issue.
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
    delete:
      tags:
        - metalake
      summary: Drop metalake
      operationId: dropMetalake
      description: Drops a specified metalake
      parameters:
        - $ref: '#/components/parameters/force'
      responses:
        '200':
          $ref: '#/components/responses/DropResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
  /metalakes/{metalake}/tags:
    parameters:
      - $ref: '#/components/parameters/metalake'
    get:
      tags:
        - tag
      summary: List tags (names)
      operationId: listTags
      parameters:
        - $ref: '#/components/parameters/details'
      responses:
        '200':
          description: Returns the list of tag objects if {details} is true, otherwise returns the list of tag name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NameListResponse'
                  - $ref: '#/components/schemas/TagListResponse'
              examples:
                NameListResponse:
                  $ref: '#/components/examples/NameListResponse'
                TagListResponse:
                  $ref: '#/components/examples/TagListResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '404':
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    post:
      tags:
        - tag
      summary: Create tag
      operationId: createTag
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreateRequest'
            examples:
              TagCreate:
                $ref: '#/components/examples/TagCreate'
      responses:
        '200':
          description: Returns the created tag object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/TagResponse'
              examples:
                TagResponse:
                  $ref: '#/components/examples/TagResponse'
        '409':
          description: Conflict - The target tag already exists in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                TagAlreadyExistsException:
                  $ref: '#/components/examples/TagAlreadyExistsException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
  /metalakes/{metalake}/tags/{tag}:
    parameters:
      - $ref: '#/components/parameters/metalake'
      - $ref: '#/components/parameters/tag'
    get:
      tags:
        - tag
      summary: Get tag
      operationId: getTag
      description: Returns the specified tag information in the specified metalake
      responses:
        '200':
          description: Returns the tag object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/TagResponse'
                examples:
                  TagResponse:
                    $ref: '#/components/examples/TagResponse'
        '404':
          description: Not Found - The specified tag does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
                NoSuchTagException:
                  $ref: '#/components/examples/NoSuchTagException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    put:
      tags:
        - tag
      summary: Update tag
      operationId: alterTag
      description: Alters the specified tag information in the specified metalake
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagUpdatesRequest'
      responses:
        '200':
          description: Returns the updated tag object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/TagResponse'
              examples:
                TagResponse:
                  $ref: '#/components/examples/TagResponse'
        '404':
          description: Not Found - The specified tag does not exist in the specified metalake
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
                NoSuchTagException:
                  $ref: '#/components/examples/NoSuchTagException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    delete:
      tags:
        - tag
      summary: Delete tag
      operationId: deleteTag
      responses:
        '200':
          $ref: '#/components/responses/DropResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
  /metalakes/{metalake}/objects/{metadataObjectType}/{metadataObjectFullName}/tags:
    parameters:
      - $ref: '#/components/parameters/metalake'
      - $ref: '#/components/parameters/metadataObjectType'
      - $ref: '#/components/parameters/metadataObjectFullName'
    get:
      tags:
        - tag
      summary: List tags (names) for metadata object
      operationId: listObjectTags
      parameters:
        - $ref: '#/components/parameters/details'
      responses:
        '200':
          description: Returns the list of tag objects associated with specified metadata object if {details} is true, otherwise returns the list of tag name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NameListResponse'
                  - $ref: '#/components/schemas/TagListResponse'
              examples:
                NameListResponse:
                  $ref: '#/components/examples/NameListResponse'
                TagListResponse:
                  $ref: '#/components/examples/TagListResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '404':
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    post:
      tags:
        - tag
      summary: Associate tags with metadata object
      description: Associate and disassociate tags with metadata object, please be aware that supported metadata objects are CATALOG, SCHEMA, TABLE, VIEW, FILESET, TOPIC, COLUMN, MODEL, FUNCTION
      operationId: associateTags
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagsAssociateRequest'
            examples:
              TagAssociate:
                $ref: '#/components/examples/TagAssociate'
      responses:
        '200':
          description: Returns the list of tag names associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/NameListResponse'
              examples:
                NameListResponse:
                  $ref: '#/components/examples/NameListResponse'
        '404':
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
        '409':
          description: Conflict - The target tag already associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                TagAlreadyAssociatedException:
                  $ref: '#/components/examples/TagAlreadyAssociatedException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
  /metalakes/{metalake}/objects/{metadataObjectType}/{metadataObjectFullName}/policies:
    parameters:
      - $ref: '#/components/parameters/metalake'
      - $ref: '#/components/parameters/metadataObjectType'
      - $ref: '#/components/parameters/metadataObjectFullName'
    get:
      tags:
        - policy
      summary: List policies (names) for metadata object
      operationId: listPoliciesForMetadataObject
      parameters:
        - $ref: '#/components/parameters/parameters-details'
      responses:
        '200':
          description: Returns the list of policy objects associated with specified metadata object if {details} is true, otherwise returns the list of policy name
          content:
            application/vnd.gravitino.v1+json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NameListResponse'
                  - $ref: '#/components/schemas/PolicyListResponse'
              examples:
                NameListResponse:
                  $ref: '#/components/examples/examples-NameListResponse'
                PolicyListResponse:
                  $ref: '#/components/examples/PolicyListResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '404':
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    post:
      tags:
        - policy
      summary: Associate policies with metadata object
      description: Associate and disassociate policies with metadata object, please be aware that supported metadata objects are CATALOG, SCHEMA, TABLE, FILESET, TOPIC, COLUMN
      operationId: associatePoliciesForObject
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoliciesAssociateRequest'
            examples:
              PolicyAssociate:
                $ref: '#/components/examples/PolicyAssociate'
      responses:
        '200':
          description: Returns the list of policy names associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/NameListResponse'
              examples:
                NameListResponse:
                  $ref: '#/components/examples/examples-NameListResponse'
        '404':
          description: Not Found - The specified metalake does not exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetalakeException:
                  $ref: '#/components/examples/NoSuchMetalakeException'
        '409':
          description: Conflict - The target policy already associated with the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                PolicyAlreadyAssociatedException:
                  $ref: '#/components/examples/PolicyAlreadyAssociatedException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
  /metalakes/{metalake}/objects/{metadataObjectType}/{metadataObjectFullName}/statistics:
    parameters:
      - $ref: '#/components/parameters/metalake'
      - $ref: '#/components/parameters/metadataObjectType'
      - $ref: '#/components/parameters/metadataObjectFullName'
    get:
      tags:
        - statistics
      summary: List statistics
      operationId: listStatistics
      responses:
        '200':
          description: Returns the statistics for the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/StatisticListResponse'
              examples:
                StatisticListResponse:
                  $ref: '#/components/examples/StatisticListResponse'
        '404':
          description: Not Found - The specified metadata object doesn't exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetadataObjectException:
                  $ref: '#/components/examples/NoSuchMetadataObjectException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    post:
      tags:
        - statistics
      summary: Drop statistics
      operationId: dropStatistics
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatisticsDropRequest'
            examples:
              StatisticsDropRequest:
                $ref: '#/components/examples/StatisticsDropRequest'
      responses:
        '200':
          $ref: '#/components/responses/DropResponse'
        '400':
          description: Bad Request - The request contains illegal statistic names
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                IllegalStatisticNameException:
                  $ref: '#/components/examples/IllegalStatisticNameException'
        '404':
          description: Not Found - The specified metadata object doesn't exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetadataObjectException:
                  $ref: '#/components/examples/NoSuchMetadataObjectException'
        '405':
          description: Method Not Allowed - The specified statistic is unmodifiable
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                UnmodifiableStatisticException:
                  $ref: '#/components/examples/UnmodifiableStatisticException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    put:
      tags:
        - statistics
      summary: Update statistics
      operationId: updateStatistics
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatisticsUpdateRequest'
            examples:
              StatisticsUpdateRequest:
                $ref: '#/components/examples/StatisticsUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/BaseResponse'
        '400':
          description: Bad Request - The request contains illegal statistic names
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                IllegalStatisticNameException:
                  $ref: '#/components/examples/IllegalStatisticNameException'
        '404':
          description: Not Found - The specified metadata object doesn't exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetadataObjectException:
                  $ref: '#/components/examples/NoSuchMetadataObjectException'
        '405':
          description: Method Not Allowed - The specified statistic is unmodifiable
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                UnmodifiableStatisticException:
                  $ref: '#/components/examples/UnmodifiableStatisticException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
  /metalakes/{metalake}/objects/{metadataObjectType}/{metadataObjectFullName}/statistics/partitions:
    parameters:
      - $ref: '#/components/parameters/metalake'
      - $ref: '#/components/parameters/metadataObjectType'
      - $ref: '#/components/parameters/metadataObjectFullName'
    get:
      tags:
        - partition-statistics
      summary: List partition statistics
      operationId: listPartitionStatistics
      parameters:
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/fromInclusive'
        - $ref: '#/components/parameters/toInclusive'
      responses:
        '200':
          description: Returns the partition statistics for the specified metadata object
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/PartitionStatisticsListResponse'
              examples:
                PartitionStatisticsListResponse:
                  $ref: '#/components/examples/PartitionStatisticListResponse'
        '400':
          $ref: '#/components/responses/BadRequestErrorResponse'
        '404':
          description: Not Found - The specified metadata object doesn't exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetadataObjectException:
                  $ref: '#/components/examples/NoSuchMetadataObjectException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    post:
      tags:
        - partition-statistics
      summary: Drop partition statistics
      operationId: dropPartitionStatistics
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartitionStatisticsDropRequest'
            examples:
              PartitionStatisticsDropRequest:
                $ref: '#/components/examples/PartitionStatisticsDropRequest'
      responses:
        '200':
          $ref: '#/components/responses/DropResponse'
        '400':
          description: Bad Request - The request contains illegal statistic names
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                IllegalStatisticNameException:
                  $ref: '#/components/examples/IllegalStatisticNameException'
        '404':
          description: Not Found - The specified metadata object doesn't exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetadataObjectException:
                  $ref: '#/components/examples/NoSuchMetadataObjectException'
        '405':
          description: Method Not Allowed - The specified statistic is unmodifiable
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                UnmodifiableStatisticException:
                  $ref: '#/components/examples/UnmodifiableStatisticException'
        5xx:
          $ref: '#/components/responses/ServerErrorResponse'
    put:
      tags:
        - partition-statistics
      summary: Update partition statistics
      operationId: updatePartitionStatistics
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartitionStatisticsUpdateRequest'
            examples:
              PartitionStatisticUpdateRequest:
                $ref: '#/components/examples/PartitionStatisticUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/BaseResponse'
        '400':
          description: Bad Request - The request contains illegal statistic names
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                IllegalStatisticNameException:
                  $ref: '#/components/examples/IllegalStatisticNameException'
        '404':
          description: Not Found - The specified metadata object doesn't exist
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                NoSuchMetadataObjectException:
                  $ref: '#/components/examples/NoSuchMetadataObjectException'
        '405':
          description: Method Not Allowed - The specified statistic is unmodifiable
          content:
            application/vnd.gravitino.v1+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              examples:
                UnmodifiableStatisticException:
                  $ref: '#/components/examples/UnmodifiableStatisticException'
        5xx:
