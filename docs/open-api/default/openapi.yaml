          type: string
          description: The new default catalog, or null to unset it
          nullable: true
        defaultSchema:
          type: string
          description: The new default schema, or null to unset it
          nullable: true
        comment:
          type: string
          description: The new comment, or null to unset it
          nullable: true
      example:
        '@type': replaceView
        columns: []
        representations:
          - type: sql
            dialect: trino
            sql: SELECT 2
        defaultCatalog: cat1
        defaultSchema: sch1
        comment: new comment
