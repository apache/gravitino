---

paths:
  /health:
    get:
      tags:
        - health
      summary: Aggregate health
      operationId: aggregateHealth
      description: >
        Returns aggregate health status combining liveness and readiness checks.
        Returns 200 when all checks pass; 503 when any check fails.
        This endpoint is exempt from authentication so probes can reach it without credentials.
        Root-level aliases at /health and /health.html (outside the /api base path) are also
        available for GTMs that require probes at well-known root paths.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"
        "503":
          $ref: "#/components/responses/HealthResponse"
        "4XX":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5XX":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /health/live:
    get:
      tags:
        - health
      summary: Liveness check
      operationId: livenessCheck
      description: >
        Returns 200 as long as the HTTP server thread can respond.
        Use this for Kubernetes liveness probes to determine whether to restart a pod.
        This endpoint is exempt from authentication so probes can reach it without credentials.
        A root-level alias at /health/live (outside the /api base path) is also available
        for GTMs that require probes at well-known root paths.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"
        "4XX":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5XX":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

  /health/ready:
    get:
      tags:
        - health
      summary: Readiness check
      operationId: readinessCheck
      description: >
        Returns 200 when the entity store is reachable within the configured probe timeout.
        Returns 503 when the entity store is unavailable or slow.
        Use this for Kubernetes readiness probes to control traffic routing.
        This endpoint is exempt from authentication so probes can reach it without credentials.
        A root-level alias at /health/ready (outside the /api base path) is also available
        for GTMs that require probes at well-known root paths.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"
        "503":
          $ref: "#/components/responses/HealthResponse"
        "4XX":
          $ref: "./openapi.yaml#/components/responses/BadRequestErrorResponse"
        "5XX":
          $ref: "./openapi.yaml#/components/responses/ServerErrorResponse"

components:
  responses:
    HealthResponse:
      description: Health check result
      content:
        application/vnd.gravitino.v1+json:
          schema:
            $ref: "#/components/schemas/HealthResponse"
          examples:
            HealthUp:
              $ref: "#/components/examples/HealthUp"
            HealthDown:
              $ref: "#/components/examples/HealthDown"

  schemas:
    HealthResponse:
      type: object
      required:
        - code
        - status
        - checks
      properties:
        code:
          type: integer
          description: Response code, 0 for success
          example: 0
        status:
          type: string
          enum:
            - UP
            - DOWN
          description: Aggregate health status
        checks:
          type: array
          description: Per-component check results
          items:
            $ref: "#/components/schemas/HealthCheck"

    HealthCheck:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
          description: Name of the component being checked
          example: entityStore
        status:
          type: string
          enum:
            - UP
            - DOWN
          description: Status of the component
        details:
          type: object
          additionalProperties:
            type: string
          description: Optional diagnostic details about the check result

  examples:
    HealthUp:
      value:
        code: 0
        status: UP
        checks:
          - name: httpServer
            status: UP
            details: {}
          - name: entityStore
            status: UP
            details: {}

    HealthDown:
      value:
        code: 0
        status: DOWN
        checks:
          - name: httpServer
            status: UP
            details: {}
          - name: entityStore
            status: DOWN
            details:
              reason: timeout
