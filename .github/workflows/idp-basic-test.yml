name: IdP Basic Test

on:
  push:
    branches: ["main", "branch-*"]
  pull_request:
    branches: ["main", "branch-*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            source_changes:
              - plugins/idp-basic/**
              - core/**
              - gradle/**
              - gradlew
              - dev/**
              - build.gradle.kts
              - gradle.properties
              - settings.gradle.kts
              - .github/workflows/idp-basic-test.yml
      - name: Detect idp-basic module
        id: module
        run: |
          if [ -f plugins/idp-basic/build.gradle.kts ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
    outputs:
      source_changes: ${{ steps.filter.outputs.source_changes }}
      module_exists: ${{ steps.module.outputs.exists }}

  idp-basic-test:
    needs: changes
    if: needs.changes.outputs.source_changes == 'true' && needs.changes.outputs.module_exists == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Check required command
        run: |
          dev/ci/check_commands.sh

      - name: Package Gravitino
        run: |
          ./gradlew compileDistribution -PskipWeb=true -x test

      - name: Free up disk space
        run: |
          dev/ci/util_free_space.sh

      - name: Run idp-basic unit tests
        run: |
          ./gradlew :plugins:idp-basic:test -PskipITs -PskipDockerTests=true -PskipWeb=true

      - name: Run idp-basic REST API integration tests
        id: integrationTest
        env:
          dockerTest: true
        run: |
          IDP_IT_TESTS="org.apache.gravitino.idp.integration.test.**"

          run_idp_it() {
            ./gradlew :plugins:idp-basic:test \
              -PtestMode="$1" \
              -PjdbcBackend="$2" \
              -PskipDockerTests=false \
              -PskipWeb=true \
              --tests "${IDP_IT_TESTS}"
          }

          # embedded: all JDBC backends; deploy: MySQL/PostgreSQL only (same as access-control IT).
          for spec in \
            embedded:h2 \
            embedded:mysql \
            embedded:postgresql \
            deploy:mysql \
            deploy:postgresql; do
            run_idp_it "${spec%%:*}" "${spec#*:}"
          done

      - name: Upload idp-basic test reports
        uses: actions/upload-artifact@v7
        if: ${{ (failure() && steps.integrationTest.outcome == 'failure') || contains(github.event.pull_request.labels.*.name, 'upload log') }}
        with:
          name: idp-basic-test-reports
          path: |
            plugins/idp-basic/build/reports
            plugins/idp-basic/build/test-results
            distribution/package/logs/gravitino-server.out
            distribution/package/logs/gravitino-server.log
