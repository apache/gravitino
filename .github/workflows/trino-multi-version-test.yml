name: Trino Multi-Version Integration Test

on:
  workflow_dispatch:
    inputs:
      trino_versions_map:
        description: 'Trino versions to test (space-separated version:module pairs)'
        required: false
        default: '478:trino-connector-473-478 473:trino-connector-473-478 469:trino-connector-469-472 452:trino-connector-452-468 446:trino-connector-446-451 440:trino-connector-440-445 435:trino-connector-435-439'

jobs:
  TrinoMultiVersionIT:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      matrix:
        java-version: [ 17 ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Check required command
        run: |
          dev/ci/check_commands.sh

      - name: Build Gravitino
        run: |
          ./gradlew build -x test

      - name: Free up disk space
        run: |
          dev/ci/util_free_space.sh

      - name: Run Multi-Version Trino Integration Tests
        id: integrationTest
        run: |
          trino-connector/integration-test/trino-test-tools/run_test_with_versions.sh \
            --trino_versions_map="${{ github.event.inputs.trino_versions_map }}" \
            --trino_test_args="--auto=all --auto_patch"

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.integrationTest.outcome == 'failure' }}
        with:
          name: trino-multi-version-test-reports-${{ matrix.java-version }}
          path: |
            build/reports
            trino-connector/integration-test/build/*.log
            trino-connector/integration-test/build/*.tar
            integration-test-common/build/trino-ci-container-log
            distribution/package/logs/gravitino-server.out
            distribution/package/logs/gravitino-server.log
            catalogs/**/*.log
