name: Trino Multi-Version Integration Test

on:
  workflow_dispatch:

jobs:
  TrinoMultiVersionIT:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      CONNECTOR_DIR: ${{ github.workspace }}/trino-connector
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Check required command
        run: dev/ci/check_commands.sh

      - name: Build Gravitino
        run: ./gradlew build -x test

      - name: Free up disk space
        run: dev/ci/util_free_space.sh

      - name: Test Trino 478
        id: test478
        run: |
          trino-connector/integration-test/trino-test-tools/trino_integration_test.sh \
            --auto=all --auto_patch --trino_version=478 \
            --trino_connector_dir=${{ env.CONNECTOR_DIR }}/trino-connector-473-478/build/libs

      - name: Test Trino 473
        id: test473
        run: |
          trino-connector/integration-test/trino-test-tools/trino_integration_test.sh \
            --auto=all --auto_patch --trino_version=473 \
            --trino_connector_dir=${{ env.CONNECTOR_DIR }}/trino-connector-473-478/build/libs

      - name: Test Trino 469
        id: test469
        run: |
          trino-connector/integration-test/trino-test-tools/trino_integration_test.sh \
            --auto=all --auto_patch --trino_version=469 \
            --trino_connector_dir=${{ env.CONNECTOR_DIR }}/trino-connector-469-472/build/libs

      - name: Test Trino 452
        id: test452
        run: |
          trino-connector/integration-test/trino-test-tools/trino_integration_test.sh \
            --auto=all --auto_patch --trino_version=452 \
            --trino_connector_dir=${{ env.CONNECTOR_DIR }}/trino-connector-452-468/build/libs

      - name: Test Trino 446
        id: test446
        run: |
          trino-connector/integration-test/trino-test-tools/trino_integration_test.sh \
            --auto=all --auto_patch --trino_version=446 \
            --trino_connector_dir=${{ env.CONNECTOR_DIR }}/trino-connector-446-451/build/libs

      - name: Test Trino 440
        id: test440
        run: |
          trino-connector/integration-test/trino-test-tools/trino_integration_test.sh \
            --auto=all --auto_patch --trino_version=440 \
            --trino_connector_dir=${{ env.CONNECTOR_DIR }}/trino-connector-440-445/build/libs

      - name: Test Trino 435
        id: test435
        run: |
          trino-connector/integration-test/trino-test-tools/trino_integration_test.sh \
            --auto=all --auto_patch --trino_version=435 \
            --trino_connector_dir=${{ env.CONNECTOR_DIR }}/trino-connector-435-439/build/libs

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: trino-multi-version-test-reports
          path: |
            build/reports
            trino-connector/integration-test/build/*.log
            trino-connector/integration-test/build/*.tar
            integration-test-common/build/trino-ci-container-log
            distribution/package/logs/gravitino-server.out
            distribution/package/logs/gravitino-server.log
            catalogs/**/*.log
