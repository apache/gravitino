suite: test gravitino iceberg rest server test connection hook
templates:
  - tests/test-connection.yaml
tests:
  - it: renders the helm test connection pod
    release:
      name: iceberg-rest
      namespace: iceberg-system
    set:
      service:
        name: custom-iceberg-rest
        port: 19001
    asserts:
      - isKind:
          of: Pod
      - equal:
          path: metadata.name
          value: iceberg-rest-gravitino-iceberg-rest-server-helm-test-connection
      - equal:
          path: metadata.namespace
          value: iceberg-system
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
      - contains:
          path: spec.containers[0].env
          content:
            name: SERVICE_NAME
            value: custom-iceberg-rest
          any: true
      - contains:
          path: spec.containers[0].env
          content:
            name: SERVICE_PORT
            value: "19001"
          any: true
      - matchRegex:
          path: spec.containers[0].command[2]
          pattern: "/iceberg/v1/config"
