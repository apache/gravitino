suite: test gravitino iceberg rest server httproute
templates:
  - httproute.yaml
tests:
  - it: does not render httproute by default
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render httproute when type is the default ingress
    set:
      ingress:
        enabled: true
        type: ingress
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a Gateway API HTTPRoute when type is gateway
    release:
      name: iceberg-rest
    set:
      ingress:
        enabled: true
        type: gateway
        annotations:
          example.com/route: "true"
        hosts:
          - host: iceberg-rest.example.com
            paths:
              - path: /iceberg
                pathType: Prefix
              - path: /exact
                pathType: Exact
        gateway:
          parentRefs:
            - name: external
              namespace: gateway-system
              sectionName: https
    asserts:
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: iceberg-rest-gravitino-iceberg-rest-server-helm
      - equal:
          path: metadata.annotations["example.com/route"]
          value: "true"
      - equal:
          path: spec.parentRefs[0].name
          value: external
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-system
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https
      - contains:
          path: spec.hostnames
          content: iceberg-rest.example.com
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /iceberg
      - equal:
          path: spec.rules[1].matches[0].path.type
          value: Exact
      - equal:
          path: spec.rules[1].matches[0].path.value
          value: /exact
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: iceberg-rest-gravitino-iceberg-rest-server-helm
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 9001

  - it: maps ImplementationSpecific pathType to PathPrefix in gateway mode
    set:
      ingress:
        enabled: true
        type: gateway
        hosts:
          - host: iceberg-rest.example.com
            paths:
              - path: /
                pathType: ImplementationSpecific
        gateway:
          parentRefs:
            - name: external
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /

  - it: defaults pathType to PathPrefix when unset in gateway mode
    set:
      ingress:
        enabled: true
        type: gateway
        hosts:
          - host: iceberg-rest.example.com
            paths:
              - path: /api
        gateway:
          parentRefs:
            - name: external
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix

  - it: fails rendering on an unsupported pathType in gateway mode
    set:
      ingress:
        enabled: true
        type: gateway
        hosts:
          - host: iceberg-rest.example.com
            paths:
              - path: /re
                pathType: RegularExpression
        gateway:
          parentRefs:
            - name: external
    asserts:
      - failedTemplate:
          errorMessage: 'ingress.hosts[].paths[].pathType "RegularExpression" is not supported when ingress.type is "gateway"; use Exact, Prefix, or ImplementationSpecific'

  - it: renders one HTTPRoute per host so paths stay scoped to their host
    release:
      name: iceberg-rest
    set:
      ingress:
        enabled: true
        type: gateway
        hosts:
          - host: a.example.com
            paths:
              - path: /a
                pathType: Prefix
          - host: b.example.com
            paths:
              - path: /b
                pathType: Prefix
        gateway:
          parentRefs:
            - name: external
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: iceberg-rest-gravitino-iceberg-rest-server-helm
        documentIndex: 0
      - contains:
          path: spec.hostnames
          content: a.example.com
        documentIndex: 0
      - notContains:
          path: spec.hostnames
          content: b.example.com
        documentIndex: 0
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /a
        documentIndex: 0
      - equal:
          path: metadata.name
          value: iceberg-rest-gravitino-iceberg-rest-server-helm-1
        documentIndex: 1
      - contains:
          path: spec.hostnames
          content: b.example.com
        documentIndex: 1
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /b
        documentIndex: 1
