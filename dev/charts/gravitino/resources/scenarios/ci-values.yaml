mysql:
  enabled: true

visibleConfigs: "gravitino.custom.example.url,gravitino.custom.example.username,gravitino.custom.example.password,gravitino.custom.example.auth.type"

visibleConfigsItems:
  gravitino.custom.example.url: "http://example:6080"
  gravitino.custom.example.username: admin
  gravitino.custom.example.password: "exampleR0cks!"
  gravitino.custom.example.auth.type: simple

additionalConfigItems:
  gravitino.server.shutdown.timeout: "5000"

extraVolumeMounts:
  - name: gravitino-log
    mountPath: /opt/gravitino/logs
  - name: extra-volume
    mountPath: /extra-volume-path
  - name: another-extra-volume
    mountPath: /another-extra-volume-path

extraVolumes:
  - name: gravitino-log
    emptyDir: {}
  - name: extra-volume
    emptyDir: {}
  - name: another-extra-volume
    emptyDir: {}

replicas: 2

env:
  - name: HADOOP_USER_NAME
    value: hdfs

audit:
  enabled: true

log:
  containerStdout: true

log4j2Properties:
  rootLoggerLevel: warn
  rollingAppenderStrategyDeleteIfLastModifiedAge: 2d

additionalLog4j2Properties:
  appender.console.type: Console
  appender.console.name: console
  appender.console.layout.type: PatternLayout
  appender.console.layout.pattern: "%d{HH:mm:ss.SSS} %level %msg%n"
  rootLogger.appenderRef.console.ref: console

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true