suite: test gravitino lance rest server test connection hook
templates:
  - tests/test-connection.yaml
tests:
  - it: renders the helm test connection pod
    release:
      name: lance-rest
      namespace: lance-system
    set:
      service:
        name: custom-lance-rest
        port: 19101
    asserts:
      - isKind:
          of: Pod
      - equal:
          path: metadata.name
          value: lance-rest-gravitino-lance-rest-server-helm-test-connection
      - equal:
          path: metadata.namespace
          value: lance-system
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
      - contains:
          path: spec.containers[0].env
          content:
            name: SERVICE_NAME
            value: custom-lance-rest
          any: true
      - contains:
          path: spec.containers[0].env
          content:
            name: SERVICE_PORT
            value: "19101"
          any: true
      - contains:
          path: spec.containers[0].env
          content:
            name: TEST_PATH
            value: /lance/v1/namespace/%24/list
          any: true
