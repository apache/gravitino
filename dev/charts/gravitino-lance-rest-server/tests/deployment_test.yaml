suite: test gravitino lance rest server deployment
templates:
  - deployment.yaml
  - configmap.yaml
tests:
  - it: renders the default deployment
    template: deployment.yaml
    release:
      name: lance-rest
    set:
      lanceRest:
        gravitinoMetalake: lrs_test
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: lance-rest-gravitino-lance-rest-server-helm
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: lance-rest
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default
      - equal:
          path: spec.template.spec.containers[0].image
          value: apache/gravitino-lance-rest:1.3.0-SNAPSHOT
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITINO_HOME
            value: /opt/gravitino-lance-rest-server
          any: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SKIP_CONFIG_REWRITE
            value: "true"
          any: true
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 9101
            protocol: TCP
          any: true
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /lance/v1/namespace/%24/list
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /lance/v1/namespace/%24/list
      - contains:
          path: spec.template.spec.volumes
          content:
            name: lance-rest-server-config
            configMap:
              name: lance-rest-gravitino-lance-rest-server-helm
          any: true

  - it: renders pod customization, templated env, and scheduling options
    template: deployment.yaml
    release:
      name: custom-lance-rest
    set:
      replicaCount: 3
      lanceRest:
        gravitinoMetalake: lrs_custom
      image:
        repository: registry.example.com/gravitino-lance-rest
        tag: test-tag
        pullPolicy: Always
      imagePullSecrets:
        - name: registry-secret
      serviceAccount:
        create: true
        name: lance-rest-sa
      podLabels:
        app.kubernetes.io/part-of: gravitino
      podAnnotations:
        prometheus.io/scrape: "true"
      envWithTpl:
        - name: RELEASE_NAME
          value: "{{ .Release.Name }}"
      envFrom:
        - configMapRef:
            name: lance-rest-env
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: dedicated
          operator: Equal
          value: metadata
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
    asserts:
      - equal:
          path: spec.replicas
          value: 3
      - equal:
          path: spec.template.spec.serviceAccountName
          value: lance-rest-sa
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: registry-secret
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/gravitino-lance-rest:test-tag
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/part-of"]
          value: gravitino
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RELEASE_NAME
            value: custom-lance-rest
          any: true
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: lance-rest-env
      - equal:
          path: spec.template.spec.nodeSelector["kubernetes.io/os"]
          value: linux
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: dedicated
            operator: Equal
            value: metadata
            effect: NoSchedule
          any: true
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: kubernetes.io/arch

  - it: renders security contexts, resources, volumes, and custom probes
    template: deployment.yaml
    set:
      lanceRest:
        gravitinoMetalake: lrs_test
      podSecurityContext:
        fsGroup: 1000
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
      livenessProbe:
        httpGet:
          path: /custom/live
          port: http
        initialDelaySeconds: 30
        timeoutSeconds: 3
      readinessProbe:
        httpGet:
          path: /custom/ready
          port: http
        initialDelaySeconds: 10
        timeoutSeconds: 2
      volumes:
        - name: lance-data
          emptyDir: {}
      volumeMounts:
        - name: lance-data
          mountPath: /var/lib/lance
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 2000
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 1Gi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "2"
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /custom/live
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /custom/ready
      - contains:
          path: spec.template.spec.volumes
          content:
            name: lance-data
            emptyDir: {}
          any: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: lance-data
            mountPath: /var/lib/lance
          any: true
