suite: test gravitino lance rest server service
templates:
  - service.yaml
tests:
  - it: renders the default ClusterIP service
    release:
      name: lance-rest
      namespace: lance-system
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: gravitino-lance-rest-server
      - equal:
          path: metadata.namespace
          value: lance-system
      - equal:
          path: spec.type
          value: ClusterIP
      - contains:
          path: spec.ports
          content:
            name: http
            port: 9101
            protocol: TCP
            targetPort: 9101
          any: true
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: lance-rest

  - it: renders NodePort when requested
    set:
      service:
        type: NodePort
        nodePort: 30101
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].nodePort
          value: 30101

  - it: renders service customization
    set:
      service:
        port: 19101
        targetPort: 19102
        portName: lance
        labels:
          exposure: public
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: nlb
    asserts:
      - contains:
          path: spec.ports
          content:
            name: lance
            port: 19101
            protocol: TCP
            targetPort: 19102
          any: true
      - equal:
          path: metadata.labels.exposure
          value: public
      - equal:
          path: metadata.annotations["service.beta.kubernetes.io/aws-load-balancer-type"]
          value: nlb
